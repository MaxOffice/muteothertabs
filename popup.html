<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mute Other Tabs</title>
  <style>
    :root { --blue:#2563eb; --green:#059669; --red:#dc2626; }
    body{
      width: 320px;
      padding: 14px 14px 28px 14px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 14px;
      color:#111827;
      position: relative;
    }
    h3{ margin:0 0 10px 0; font-size:16px; }
    .btn{
      width:100%;
      padding:10px 10px;
      border:1px solid #d1d5db;
      border-radius:10px;
      background:#fff;
      cursor:pointer;
      margin: 8px 0;
      font-size:14px;
      text-align:left;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
    }
    .btn.primary{ background: var(--red); color:#fff; border-color: var(--red); }
    .btn.solo{ background: var(--blue); color:#fff; border-color: var(--blue); }
    .btn.unmute{ background: var(--green); color:#fff; border-color: var(--green); }
    .btn:active{ transform: translateY(1px); }
    .kbd{ font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; opacity: .92; white-space: nowrap; }
    #status{ font-size:12px; color:#065f46; min-height:16px; margin-top:6px; }
    .credit{
      position:absolute;
      right:8px;
      bottom:6px;
      font-size:11px;
      color:#6b7280;
      white-space:nowrap;
    }
  </style>
</head>
<body>
  <h3>Mute🔇Other Tabs</h3>

  <button id="muteAllBtn" class="btn primary">
    <span>Mute all tabs</span>
    <span class="kbd" id="kbdMuteAll">Ctrl+F7</span>
  </button>

  <button id="soloBtn" class="btn solo">
    <span>Mute all except current tab (Solo)</span>
    <span class="kbd" id="kbdSolo">Ctrl+F8</span>
  </button>

  <button id="unmuteAllBtn" class="btn unmute">
    <span>Unmute all tabs</span>
    <span class="kbd" id="kbdUnmuteAll">Ctrl+F9</span>
  </button>

  <div id="status"></div>

  <div class="credit">Conceived by Dr Nitin, created by M365 Copilot</div>

  <script src="popup.js"></script>
</body>
</html>
